<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Trang index</title>
<style>
.region{
    padding:30px;
    border-style:solid;
}
.header{
    background-color:lightcyan;
    text-align:center;
    height: 200px;
}
.navigation_menu{
    background-color:lightgray;
    height:10px;
    text-align:center;
}
.content{
    background-color:lightsalmon;
    height:300px;
}
.footer{
    background-color:lightgray;
    text-align:center;
    height:10px;
}
</style>
</head>
<body>
<div class="header region">
    HEADER (Phần đầu trang)
</div>
<div class="navigation_menu region">
    MENU (Thanh điều hướng)
</div>
<div class="content region">
    CONTENTS (Phần nội dung)
</div>
<div class="footer region">
    FOOTER (Phần chân trang)
</div>
</body>
</html>
